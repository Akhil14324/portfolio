<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vallabhani Akhil — Space Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cyan:#00f5ff;--purple:#c800ff;--green:#00ff88;--orange:#ff6a00;--pink:#ff0080;}
html,body{width:100%;height:100%;overflow:hidden;background:#04040c;font-family:'Rajdhani',sans-serif;cursor:none;}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:24px;height:24px;border:2px solid #00f5ff;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:border-color .3s,width .15s,height .15s;box-shadow:0 0 8px #00f5ff55;}
#cursor-dot{position:fixed;width:5px;height:5px;background:#00f5ff;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:background .3s;box-shadow:0 0 6px #00f5ff;}
#cursor.click{width:34px;height:34px;opacity:.7;}

/* LOADING SCREEN */
#loader{position:fixed;inset:0;background:#04040c;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
#loader-bar-wrap{width:280px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:14px;}
#loader-bar{height:100%;width:0%;background:var(--cyan);border-radius:2px;box-shadow:0 0 10px var(--cyan);transition:width .3s ease;}
#loader-ship{position:relative;width:80px;height:120px;}
#loader-title{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:6px;color:rgba(255,255,255,.4);}
#loader-bar-wrap{width:260px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#loader-bar{height:100%;width:0%;background:var(--cyan);border-radius:2px;box-shadow:0 0 8px var(--cyan);}
#loader-status{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(0,245,255,.5);}

/* WARP OVERLAY */

/* DEBRIS CANVAS */
#debris-canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}

/* NEBULA PULSE */
#nebula-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* RESUME BTN */
.resume-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:10px 22px;border:1.5px solid;border-radius:25px;background:transparent;cursor:none;text-decoration:none;transition:background .2s;margin-top:16px;opacity:0;transform:translateY(10px);}
.resume-btn:hover{background:rgba(255,255,255,.06);}
.resume-btn svg{width:14px;height:14px;}
#bg-canvas{position:fixed;inset:0;z-index:0;}
#trail-canvas{position:fixed;inset:0;z-index:8;pointer-events:none;}

/* HUD */
#hud-tl{position:fixed;top:18px;left:22px;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--cyan);z-index:100;opacity:.8;}
#hud-tr{position:fixed;top:18px;right:22px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:#00ff88;z-index:100;}
.corner{position:fixed;width:20px;height:20px;z-index:100;}
.c-tl{top:8px;left:8px;border-top:2px solid rgba(0,245,255,.5);border-left:2px solid rgba(0,245,255,.5);}
.c-tr{top:8px;right:8px;border-top:2px solid rgba(0,245,255,.5);border-right:2px solid rgba(0,245,255,.5);}
.c-bl{bottom:8px;left:8px;border-bottom:2px solid rgba(0,245,255,.5);border-left:2px solid rgba(0,245,255,.5);}
.c-br{bottom:8px;right:8px;border-bottom:2px solid rgba(0,245,255,.5);border-right:2px solid rgba(0,245,255,.5);}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.2);z-index:100;white-space:nowrap;}

/* BREADCRUMBS */
#breadcrumbs{position:fixed;left:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100;}
.bcrumb{width:38px;height:38px;border-radius:50%;border:2px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;opacity:0;transform:scale(0);transition:all .3s;position:relative;background:rgba(4,4,12,.8);}
.bcrumb.visible{opacity:1;transform:scale(1);}
.bcrumb:hover{transform:scale(1.2)!important;}
.bcrumb-tip{position:absolute;left:48px;top:50%;transform:translateY(-50%);font-family:'Share Tech Mono',monospace;font-size:9px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;padding:3px 10px;background:rgba(4,4,12,.95);border-radius:4px;border:1px solid rgba(255,255,255,.1);}
.bcrumb:hover .bcrumb-tip{opacity:1;}

/* NAV DOTS */
#nav-dots{position:fixed;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px;z-index:100;}
.ndot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.2);opacity:.3;cursor:pointer;transition:all .3s;position:relative;}
.ndot.unlocked{opacity:.7;}
.ndot.active{opacity:1;transform:scale(1.5);}
.ndot-tip{position:absolute;right:22px;top:50%;transform:translateY(-50%);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;padding:3px 8px;background:rgba(4,4,12,.95);border-radius:3px;}
.ndot:hover .ndot-tip{opacity:1;}

/* SCENE */
#scene{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;}

/* PLANET SIDE */
#planet-side{position:absolute;right:0;top:0;width:50%;height:100%;display:flex;align-items:center;justify-content:center;opacity:0;}
#planet-canvas{border-radius:50%;}
#satellite-wrap{position:absolute;width:500px;height:500px;pointer-events:none;}
.sat-orbit{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.06);left:50%;top:50%;transform:translate(-50%,-50%);}
#satellite{position:absolute;font-size:0;width:28px;height:14px;}
#rings-wrap{position:absolute;pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%);}

/* INFO SIDE */
#info-side{position:absolute;left:0;top:0;width:52%;height:100%;display:flex;align-items:center;justify-content:flex-start;padding-left:80px;opacity:0;}
.info-inner{max-width:540px;width:100%;}
.p-tag{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;margin-bottom:14px;opacity:0;transform:translateY(20px);}
.p-divider{height:1px;width:0;margin:12px 0;opacity:.5;}
.p-name{font-family:'Orbitron',monospace;font-size:50px;font-weight:900;line-height:1.05;letter-spacing:1px;color:#fff;opacity:0;transform:translateY(30px);text-transform:uppercase;}
.p-subtitle{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;letter-spacing:4px;margin-top:10px;opacity:0;transform:translateY(20px);text-transform:uppercase;}
.p-bio{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:500;line-height:1.8;color:rgba(255,255,255,.88);margin-top:16px;opacity:0;transform:translateY(20px);}
.p-meta{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.55);margin-top:10px;opacity:0;transform:translateY(20px);line-height:1.8;}
.tags-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}
.tag{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:7px 18px;border:1.5px solid;border-radius:25px;opacity:0;transform:translateY(10px);cursor:default;transition:transform .2s;}
.tag:hover{transform:scale(1.07) translateY(0)!important;}

/* SKILLS */
.skills-scroll{max-height:70vh;overflow-y:auto;padding-right:8px;}
.skills-scroll::-webkit-scrollbar{width:3px;}
.skills-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.skill-cat{margin-bottom:20px;opacity:0;transform:translateY(15px);}
.cat-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-bottom:10px;}
.cat-badges{display:flex;flex-wrap:wrap;gap:8px;}
.badge{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;padding:5px 14px;border:1.5px solid;border-radius:20px;opacity:0;transform:scale(.9);}

/* CAREER */
.career-scroll{max-height:72vh;overflow-y:auto;padding-right:8px;}
.career-scroll::-webkit-scrollbar{width:3px;}
.career-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.sec-heading{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);margin:20px 0 12px;display:flex;align-items:center;gap:10px;opacity:0;}
.sec-heading::after{content:'';flex:1;height:1px;background:currentColor;opacity:.4;}
.career-item{border-left:2px solid;padding-left:16px;margin-bottom:16px;opacity:0;transform:translateX(-15px);}
.ci-role{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:1px;}
.ci-co{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:rgba(255,255,255,.75);margin-top:3px;}
.ci-period{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.ci-desc{font-family:'Rajdhani',sans-serif;font-size:14px;color:rgba(255,255,255,.65);margin-top:6px;line-height:1.6;}

/* PROJECTS */
.projects-scroll{max-height:72vh;overflow-y:auto;padding-right:8px;}
.projects-scroll::-webkit-scrollbar{width:3px;}
.projects-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.proj-card{background:rgba(255,255,255,.025);border:1.5px solid;border-radius:12px;padding:18px 22px;margin-bottom:14px;opacity:0;transform:translateY(20px);}
.proj-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;letter-spacing:1.5px;}
.proj-desc{font-family:'Rajdhani',sans-serif;font-size:15px;color:rgba(255,255,255,.6);margin-top:3px;}
.proj-stack{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);margin-top:8px;line-height:1.8;}
.proj-bullets{margin-top:10px;list-style:none;}
.proj-bullets li{font-family:'Rajdhani',sans-serif;font-size:14px;color:rgba(255,255,255,.78);padding:3px 0 3px 14px;position:relative;line-height:1.5;}
.proj-bullets li::before{content:'›';position:absolute;left:0;opacity:.7;}
.proj-btns{display:flex;gap:10px;margin-top:12px;}
.proj-btn{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;padding:7px 18px;border:1.5px solid;border-radius:20px;cursor:pointer;background:transparent;text-decoration:none;transition:all .2s;}
.proj-btn:hover{background:rgba(255,255,255,.08);}

/* CONTACT */
.contact-item{margin-bottom:22px;opacity:0;transform:translateY(15px);}
.ci-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:6px;}
.ci-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:600;letter-spacing:.5px;}
.ci-val a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:2px;transition:border-color .2s;}
.ci-val a:hover{border-color:currentColor;}
.transmission{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.25);margin-top:28px;opacity:0;}

/* NEXT BUTTON */
#next-btn{position:fixed;bottom:44px;right:80px;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;padding:13px 36px;border:2px solid;border-radius:35px;background:transparent;cursor:none;z-index:200;opacity:0;pointer-events:none;transition:background .2s;white-space:nowrap;}
#next-btn:hover{background:rgba(255,255,255,.05);}
#back-btn{position:fixed;bottom:100px;right:80px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;padding:10px 28px;border:1.5px solid rgba(255,255,255,.2);border-radius:35px;background:transparent;cursor:none;z-index:200;opacity:0;pointer-events:none;transition:all .2s;white-space:nowrap;color:rgba(255,255,255,.45);}
#back-btn:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.8);}

/* SPACESHIP */
#ship-wrap{position:fixed;z-index:50;pointer-events:none;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-dot"></div>

<!-- CANVASES -->

<canvas id="trail-canvas"></canvas>
<canvas id="debris-canvas"></canvas>

<!-- LOADER -->
<div id="loader">

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>

<div id="breadcrumbs">
  <div class="bcrumb" data-i="0" style="border-color:#00f5ff;color:#00f5ff"><span class="bcrumb-tip" style="color:#00f5ff">PLANET AKHIL</span>01</div>
  <div class="bcrumb" data-i="1" style="border-color:#c800ff;color:#c800ff"><span class="bcrumb-tip" style="color:#c800ff">SKILL NEBULA</span>02</div>

  <div class="bcrumb" data-i="3" style="border-color:#ff6a00;color:#ff6a00"><span class="bcrumb-tip" style="color:#ff6a00">PROJECT STATION</span>04</div>

</div>

<div id="nav-dots">
  <div class="ndot" data-i="0" style="border-color:#00f5ff"><span class="ndot-tip" style="color:#00f5ff">PLANET AKHIL</span></div>

  <div class="ndot" data-i="2" style="border-color:#00ff88"><span class="ndot-tip" style="color:#00ff88">CAREER ORBIT</span></div>
  <div class="ndot" data-i="3" style="border-color:#ff6a00"><span class="ndot-tip" style="color:#ff6a00">PROJECT STATION</span></div>

</div>

<div id="scene">
  <div id="info-side">
    <div class="info-inner" id="info-inner"></div>
  </div>
  <div id="planet-side">
    <div id="rings-wrap"></div>
    <canvas id="planet-canvas" width="360" height="360"></canvas>
    <div id="satellite-wrap">
      <div class="sat-orbit" style="width:460px;height:460px;"></div>

let bgTime = 0;
function drawBg(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgCtx.fillStyle='#04040c';
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  // nebula clouds
  const nbs=[
    {x:0.1,y:0.1,r:300,c:'rgba(0,80,180,0.06)'},{x:0.85,y:0.2,r:250,c:'rgba(120,0,200,0.05)'},
    {x:0.5,y:0.8,r:280,c:'rgba(0,150,100,0.04)'},{x:0.7,y:0.6,r:200,c:'rgba(200,50,0,0.04)'}
  ];
  nbs.forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x*bgCanvas.width,n.y*bgCanvas.height,0,n.x*bgCanvas.width,n.y*bgCanvas.height,n.r);
    g.addColorStop(0,n.c); g.addColorStop(1,'transparent');
    bgCtx.fillStyle=g; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  });
  // stars
  bgTime+=0.016;
  stars.forEach(s=>{
    const a=s.baseA+Math.sin(bgTime*s.speed*60+s.phase)*0.3;
    bgCtx.globalAlpha=Math.max(0,a);
    bgCtx.fillStyle='#ffffff';
    bgCtx.beginPath();
    bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fill();
    if(s.r>1.5){
      bgCtx.globalAlpha=a*0.3;
      bgCtx.beginPath();
      bgCtx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
      bgCtx.fill();
    }
  });
  // meteors
  bgCtx.globalAlpha=1;
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.x+=m.vx; m.y+=m.vy; m.life-=0.015;
    if(m.life<=0){meteors.splice(i,1);continue;}
    const g2=bgCtx.createLinearGradient(m.x,m.y,m.x-m.vx*6,m.y-m.vy*6);
    g2.addColorStop(0,`rgba(255,255,220,${m.life*0.9})`);
    g2.addColorStop(1,'transparent');
    bgCtx.strokeStyle=g2; bgCtx.lineWidth=1.5;
    bgCtx.beginPath(); bgCtx.moveTo(m.x,m.y); bgCtx.lineTo(m.x+m.len,m.y-m.len*0.15); bgCtx.stroke();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ============ PLANET RENDERER ============
let planetOffset = 0;
let currentPlanetData = null;
let planetAnimFrame = null;

function drawPlanet(pData){
  const c = pCtx;
  const W = planetCanvas.width, H = planetCanvas.height;
  const cx = W/2, cy = H/2, R = 160;
  c.clearRect(0,0,W,H);

  const cols = pData.colors;
  const t = planetOffset;

  // atmosphere glow
  const ag = c.createRadialGradient(cx,cy,R*0.8,cx,cy,R*1.5);
  ag.addColorStop(0,pData.color.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.35)`));
  ag.addColorStop(1,'transparent');
  c.fillStyle=ag; c.fillRect(0,0,W,H);

  // clip to circle
  c.save(); c.beginPath(); c.arc(cx,cy,R,0,Math.PI*2); c.clip();

  // base
  const bg = c.createRadialGradient(cx-40,cy-40,0,cx,cy,R);
  bg.addColorStop(0,cols[2]); bg.addColorStop(0.5,cols[1]); bg.addColorStop(1,cols[0]);
  c.fillStyle=bg; c.fillRect(0,0,W,H);

  // terrain bands - moving
  for(let band=0;band<8;band++){
    const y0 = cy - R + band*(R*2/8);
    const bw = R*2/8;
    const alpha = 0.08+Math.sin(band*1.3)*0.05;
    c.fillStyle=`rgba(255,255,255,${alpha})`;
    c.fillRect(cx-R,y0,R*2,bw*0.4);
  }

  // surface craters / features
  const features = [
    {ox:-50,oy:-40,r:28},{ox:40,oy:20,r:18},{ox:-20,oy:50,r:22},
    {ox:60,oy:-50,r:14},{ox:-70,oy:30,r:12},{ox:20,oy:-60,r:16}
  ];
  features.forEach(f=>{
    const fx = cx + f.ox + Math.sin(t*0.5+f.ox)*3;
    const fy = cy + f.oy + Math.cos(t*0.3+f.oy)*2;
    if(fx-f.r > cx-R && fx+f.r < cx+R && fy-f.r > cy-R && fy+f.r < cy+R){
      const cg = c.createRadialGradient(fx-f.r*0.3,fy-f.r*0.3,0,fx,fy,f.r);
      cg.addColorStop(0,`rgba(255,255,255,0.06)`);
      cg.addColorStop(0.6,`rgba(0,0,0,0.18)`);
      cg.addColorStop(1,`rgba(0,0,0,0.08)`);
      c.fillStyle=cg; c.beginPath(); c.ellipse(fx,fy,f.r,f.r*0.7,0,0,Math.PI*2); c.fill();
    }
  });

  // cloud layer
  for(let cl=0;cl<5;cl++){
    const clx = cx + Math.cos(t*0.4+cl*1.3)*R*0.6;
    const cly = cy + Math.sin(cl*0.9)*R*0.4;
    const clr = 30+cl*12;
    const clog = c.createRadialGradient(clx,cly,0,clx,cly,clr);
    clog.addColorStop(0,`rgba(255,255,255,0.1)`);
    clog.addColorStop(1,'transparent');
    c.fillStyle=clog; c.fillRect(0,0,W,H);
  }

  // polar cap
  const pcg = c.createRadialGradient(cx,cy-R+20,0,cx,cy-R+20,50);
  pcg.addColorStop(0,'rgba(255,255,255,0.55)');
  pcg.addColorStop(1,'transparent');
  c.fillStyle=pcg; c.fillRect(0,0,W,H);

  // terminator (shadow edge)
  const sg = c.createLinearGradient(cx+R*0.3,cy-R,cx+R,cy+R);
  sg.addColorStop(0,'transparent');
  sg.addColorStop(0.6,'rgba(0,0,10,0.3)');
  sg.addColorStop(1,'rgba(0,0,10,0.7)');
  c.fillStyle=sg; c.fillRect(0,0,W,H);

  c.restore();

  // specular highlight
  const hl = c.createRadialGradient(cx-60,cy-60,0,cx-60,cy-60,90);
  hl.addColorStop(0,'rgba(255,255,255,0.18)');
  hl.addColorStop(1,'transparent');
  c.save(); c.beginPath(); c.arc(cx,cy,R,0,Math.PI*2); c.clip();
  c.fillStyle=hl; c.fillRect(0,0,W,H);
  c.restore();

  // outer glow ring
  const og = c.createRadialGradient(cx,cy,R,cx,cy,R+30);
  og.addColorStop(0,pData.color.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.4)`));
  og.addColorStop(1,'transparent');
  c.fillStyle=og; c.beginPath(); c.arc(cx,cy,R+30,0,Math.PI*2); c.fill();

  // rings for planet 4
  if(pData.hasRings){
    c.save();
    c.translate(cx,cy);
    c.scale(1,0.28);
    for(let ri=0;ri<4;ri++){
      const rr=R*1.3+ri*22;
      c.strokeStyle=`rgba(${ri%2?200:180},${ri%2?150:130},80,${0.35-ri*0.06})`;
      c.lineWidth=8+ri*2;
      c.beginPath(); c.arc(0,0,rr,0,Math.PI*2); c.stroke();
    }
    c.restore();
  }
}

function animatePlanet(){
  if(!currentPlanetData) return;
  planetOffset += 0.008;
  drawPlanet(currentPlanetData);
  planetAnimFrame = requestAnimationFrame(animatePlanet);
}

// ============ TRAIL PARTICLES ============
let particles = [];
let trailActive = false;
let trailCol = '#00f5ff';

function spawnTrail(){
  if(!trailActive) return;
  const wrap = document.getElementById('ship-wrap');
  const r = wrap.getBoundingClientRect();
  const sx = r.left + r.width/2;
  const sy = r.top + r.height*0.88;
  // main flame trail
  for(let i=0;i<6;i++){
    particles.push({
      x:sx+(Math.random()-0.5)*12,y:sy+(Math.random()-0.5)*6,
      vx:(Math.random()-0.5)*2, vy:Math.random()*3+2,
      life:1, size:Math.random()*7+3,
      type:'fire', hue:Math.random()<0.5?'255,100,0':'255,200,0'
    });
  }
  // smoke
  for(let i=0;i<3;i++){
    particles.push({
      x:sx+(Math.random()-0.5)*18,y:sy+10,
      vx:(Math.random()-0.5)*1.5, vy:Math.random()*2+1,
      life:0.8, size:Math.random()*14+8,
      type:'smoke'
    });
  }
  // sparks
  if(Math.random()<0.4){
    particles.push({
      x:sx,y:sy,
      vx:(Math.random()-0.5)*6, vy:Math.random()*5+2,
      life:0.6, size:2,
      type:'spark'
    });
  }
}

function drawTrail(){
  trailCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);
  spawnTrail();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=0.03; p.size*=0.97;
    if(p.life<=0){particles.splice(i,1);continue;}
    trailCtx.save();
    if(p.type==='fire'){
      trailCtx.globalAlpha=p.life*0.9;
      trailCtx.shadowBlur=12; trailCtx.shadowColor=`rgb(${p.hue})`;
      trailCtx.fillStyle=`rgba(${p.hue},${p.life})`;
      trailCtx.beginPath(); trailCtx.arc(p.x,p.y,p.size,0,Math.PI*2); trailCtx.fill();
      trailCtx.fillStyle=`rgba(255,255,200,${p.life*0.5})`;
      trailCtx.beginPath(); trailCtx.arc(p.x,p.y,p.size*0.35,0,Math.PI*2); trailCtx.fill();
    } else if(p.type==='smoke'){
      trailCtx.globalAlpha=p.life*0.25;
      trailCtx.fillStyle=`rgba(180,180,180,1)`;
      trailCtx.beginPath(); trailCtx.arc(p.x,p.y,p.size,0,Math.PI*2); trailCtx.fill();
    } else {
      trailCtx.globalAlpha=p.life;
      trailCtx.fillStyle='#ffee88';
      trailCtx.shadowBlur=6; trailCtx.shadowColor='#ffaa00';
      trailCtx.beginPath(); trailCtx.arc(p.x,p.y,p.size,0,Math.PI*2); trailCtx.fill();
    }
    trailCtx.restore();
  }
  requestAnimationFrame(drawTrail);
}
drawTrail();

  const skillCats = inner.querySelectorAll('.skill-cat');
  const badges = inner.querySelectorAll('.badge');
  const secH = inner.querySelectorAll('.sec-heading');
  const citems = inner.querySelectorAll('.career-item');

  const ccontact = inner.querySelectorAll('.contact-item');
  const trans = inner.querySelector('.transmission');

  if(ptag) tl.to(ptag,{opacity:1,y:0,duration:0.5,ease:'power3.out'},0.1);

  if(psub) tl.to(psub,{opacity:1,y:0,duration:0.5,ease:'power3.out'},0.8);
  if(dividers[1]) tl.to(dividers[1],{width:'80%',duration:0.5,ease:'power2.inOut'},0.95);
  if(pbio) tl.to(pbio,{opacity:1,y:0,duration:0.6,ease:'power3.out'},1.1);
  if(pmeta) tl.to(pmeta,{opacity:1,y:0,duration:0.5,ease:'power3.out'},1.3);
  if(tags.length) tl.to(tags,{opacity:1,y:0,duration:0.4,stagger:0.1,ease:'back.out(1.6)'},1.4);
  if(skillCats.length) tl.to(skillCats,{opacity:1,y:0,duration:0.4,stagger:0.1,ease:'power3.out'},0.9);

  if(pcards.length) tl.to(pcards,{opacity:1,y:0,duration:0.5,stagger:0.15,ease:'back.out(1.2)'},0.9);
  if(ccontact.length) tl.to(ccontact,{opacity:1,y:0,duration:0.5,stagger:0.12,ease:'power3.out'},0.9);
  if(trans) tl.to(trans,{opacity:1,duration:1,ease:'power2.out'},2.2);

// ============ LAND ON PLANET ============
function landOnPlanet(idx, fromLoad=false){
  if(isAnimating && !fromLoad) return;
  isAnimating = true;
  const p = PLANETS[idx];

  document.getElementById('hud-tl').textContent = p.hud;
  document.getElementById('hud-tl').style.color = p.color;
  // sync cursor color to planet
  document.getElementById('cursor').style.borderColor = p.color;
  document.getElementById('cursor').style.boxShadow = `0 0 8px ${p.color}55`;
  document.getElementById('cursor-dot').style.background = p.color;
  document.getElementById('cursor-dot').style.boxShadow = `0 0 6px ${p.color}`;
  updateBackBtn(idx);
  document.getElementById('hud-tr').textContent = 'APPROACHING...';
  document.getElementById('hud-tr').style.color = '#ffaa00';

  const infoSide = document.getElementById('info-side');
  const planetSide = document.getElementById('planet-side');

  // hide current content if transitioning
  if(currentPlanet >= 0 && !fromLoad){
    gsap.to([infoSide, planetSide],{opacity:0,duration:0.4,ease:'power2.in'});
  }

  // Update planet
  if(planetAnimFrame) cancelAnimationFrame(planetAnimFrame);
  currentPlanetData = p;
  animatePlanet();

  // update satellite orbit color glow
  document.getElementById('satellite-wrap').style.filter = `drop-shadow(0 0 4px ${p.color})`;

  // content
  const inner = document.getElementById('info-inner');
  inner.innerHTML = getContent(idx);
  prepContent();

  // planet position — right side
  gsap.set(planetSide,{x:0,opacity:0});
  gsap.set(infoSide,{x:0,opacity:0});

  const delay = fromLoad ? 0.3 : 0.5;

  // ship: fly to planet — enters from left if going forward, right if going back
  const pRight = window.innerWidth * 0.75 - 32;
  const pMid = window.innerHeight / 2 - 215;
  const enterFromRight = !fromLoad && idx < (currentPlanet >= 0 ? currentPlanet : 0) && currentPlanet >= 0;

  if(!fromLoad){
    // Ship enters from left or right depending on direction
    const startX = enterFromRight ? window.innerWidth + 100 : -100;
    const startRot = enterFromRight ? 10 : -10;
    trailActive = true;
    bigFlame();
    gsap.set(shipWrap,{x:startX, y:window.innerHeight/2, rotation:startRot});

    gsap.to(shipWrap,{
      duration:2.2,
      ease:'power2.inOut',
      x: pRight,
      y: pMid,
      rotation: 0,
      onComplete:()=>{
        trailActive = false;
        startIdleFlame();

        startIdleBob();
        document.getElementById('hud-tr').textContent = 'LANDED ✓';
        document.getElementById('hud-tr').style.color = '#00ff88';
        isAnimating = false;
      }
    });
  } else {
    // First load — ship comes from bottom
    trailActive = true;
    bigFlame();
    gsap.to(shipWrap,{
      x: pRight, y: pMid,
      duration:2.0, ease:'power2.out',
      onComplete:()=>{
        trailActive = false;
        startIdleFlame();
        startIdleBob();
        document.getElementById('hud-tr').textContent = 'LANDED ✓';
        document.getElementById('hud-tr').style.color = '#00ff88';
        isAnimating = false;
      }
    });
  }

  // planet zooms in from right
  gsap.fromTo(planetSide,
    {opacity:0, x:120, scale:0.6},
    {opacity:1, x:0, scale:1, duration:1.0, delay:delay, ease:'back.out(1.3)'}
  );

  // info slides in from left
  gsap.fromTo(infoSide,
    {opacity:0, x:-60},
    {opacity:1, x:0, duration:0.8, delay:delay+0.2, ease:'power3.out',
      onComplete:()=>{ animateContentIn(idx); }
    }
  );

  // update nav + breadcrumbs
  if(!visitedPlanets.includes(idx)) visitedPlanets.push(idx);
  document.querySelectorAll('.ndot').forEach((d,i)=>{
    d.classList.toggle('unlocked', visitedPlanets.includes(i));
    d.classList.toggle('active', i===idx);
    if(i===idx) d.style.background = p.color;
    else d.style.background = 'transparent';
  });
  document.querySelectorAll('.bcrumb').forEach((b,i)=>{
    if(visitedPlanets.includes(i)) b.classList.add('visible');
  });

  currentPlanet = idx;
}

// ============ COMET TAIL ============
const cometCanvas = document.createElement('canvas'); cometCanvas.width=window.innerWidth; cometCanvas.height=window.innerHeight;
const cometCtx = cometCanvas.getContext('2d');
function resizeComet(){ cometCanvas.width=window.innerWidth; cometCanvas.height=window.innerHeight; }
resizeComet(); window.addEventListener('resize',resizeComet);

let cometTrail = [];
let cometActive = false;
let lastShipX = 0, lastShipY = 0;

function updateCometTrail(){
  if(cometActive){
    const r = shipWrap.getBoundingClientRect();
    const sx = r.left+r.width/2, sy = r.top+r.height*0.85;
    if(Math.abs(sx-lastShipX)>1||Math.abs(sy-lastShipY)>1){
      cometTrail.push({x:sx,y:sy,life:1,size:Math.random()*6+3,col:trailCol});
      lastShipX=sx; lastShipY=sy;
    }
  }
  cometCtx.clearRect(0,0,cometCanvas.width,cometCanvas.height);
  for(let i=cometTrail.length-1;i>=0;i--){
    const p=cometTrail[i];
    p.life-=0.018; p.size*=0.985;
    if(p.life<=0){cometTrail.splice(i,1);continue;}
    const r2=parseInt(p.col.slice(1,3),16),g2=parseInt(p.col.slice(3,5),16),b2=parseInt(p.col.slice(5,7),16);
    cometCtx.save();
    cometCtx.globalAlpha=p.life*0.6;
    cometCtx.shadowBlur=14; cometCtx.shadowColor=p.col;
    cometCtx.fillStyle=`rgba(${r2},${g2},${b2},${p.life})`;
    cometCtx.beginPath(); cometCtx.arc(p.x,p.y,p.size,0,Math.PI*2); cometCtx.fill();
    cometCtx.globalAlpha=p.life*0.3;
    cometCtx.fillStyle='#ffffff';
    cometCtx.beginPath(); cometCtx.arc(p.x,p.y,p.size*0.3,0,Math.PI*2); cometCtx.fill();
    cometCtx.restore();
  }
  requestAnimationFrame(updateCometTrail);
}
updateCometTrail();

// ============ SPACE DEBRIS ============
const debrisCanvas = document.createElement('canvas');
debrisCanvas.style.cssText='position:fixed;inset:0;z-index:2;pointer-events:none;';
document.body.appendChild(debrisCanvas);
const dCtx = debrisCanvas.getContext('2d');
function resizeDebris(){ debrisCanvas.width=window.innerWidth; debrisCanvas.height=window.innerHeight; }
resizeDebris(); window.addEventListener('resize',resizeDebris);

const debris = [];
for(let i=0;i<25;i++){
  debris.push({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.2,
    size:Math.random()*3+1, rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-0.5)*0.02,
    type:Math.floor(Math.random()*3),
    alpha:Math.random()*0.35+0.1
  });
}

function drawDebris(){
  dCtx.clearRect(0,0,debrisCanvas.width,debrisCanvas.height);
  debris.forEach(d=>{
    d.x+=d.vx; d.y+=d.vy; d.rot+=d.rotSpeed;
    if(d.x<-20) d.x=debrisCanvas.width+20;
    if(d.x>debrisCanvas.width+20) d.x=-20;
    if(d.y<-20) d.y=debrisCanvas.height+20;
    if(d.y>debrisCanvas.height+20) d.y=-20;
    dCtx.save();
    dCtx.globalAlpha=d.alpha;
    dCtx.translate(d.x,d.y); dCtx.rotate(d.rot);
    dCtx.strokeStyle='rgba(180,200,220,0.8)'; dCtx.lineWidth=0.8;
    if(d.type===0){
      dCtx.strokeRect(-d.size,-d.size,d.size*2,d.size*2);
    } else if(d.type===1){
      dCtx.beginPath();
      dCtx.moveTo(0,-d.size); dCtx.lineTo(d.size,d.size); dCtx.lineTo(-d.size,d.size); dCtx.closePath();
      dCtx.stroke();
    } else {
      dCtx.beginPath(); dCtx.arc(0,0,d.size,0,Math.PI*2); dCtx.stroke();
    }
    dCtx.restore();
  });
  requestAnimationFrame(drawDebris);
}
drawDebris();

// ============ LOADING SCREEN ============
function runLoader(onDone){
  const steps=[
    'INITIALIZING SYSTEMS...','CALIBRATING THRUSTERS...',
    'LOADING STAR CHARTS...','PREPARING LAUNCH SEQUENCE...','ALL SYSTEMS GO.'
  ];
  const pctEl  = document.getElementById('loader-pct');
  const barEl  = document.getElementById('loader-bar');
  const txtEl  = document.getElementById('loader-text');

  // Assemble ship parts sequentially
  const tl = gsap.timeline();
  tl.to('#lpart-wings',  {opacity:1, duration:0.5, ease:'back.out(1.6)'}, 0.3)
    .to('#lpart-body',   {opacity:1, duration:0.5, ease:'back.out(1.4)'}, 0.7)
    .to('#lpart-cockpit',{opacity:1, duration:0.5, ease:'back.out(1.6)'}, 1.1)
    .to('#lpart-flame',  {opacity:1, duration:0.3, ease:'power2.out'},    1.5);

  // Flame flicker loop
  gsap.to('#lpart-flame',{scaleY:1.35,duration:0.1,repeat:-1,yoyo:true,ease:'power1.inOut',transformOrigin:'50% 0%',delay:1.5});
  // Ship hover
  gsap.to('#loader-ship-svg',{y:-10,duration:1.4,repeat:-1,yoyo:true,ease:'sine.inOut',delay:1.8});

  // Progress 0→100 smoothly
  let pct = 0;
  let stepIdx = 0;
  const interval = setInterval(()=>{
    pct = Math.min(pct + Math.random()*18 + 6, 100);
    const rounded = Math.floor(pct);
    if(pctEl) pctEl.textContent = rounded + '%';
    if(barEl) barEl.style.width = pct + '%';
    if(stepIdx < steps.length && pct >= (stepIdx+1)/steps.length*100){
      if(txtEl) txtEl.textContent = steps[stepIdx];
      stepIdx++;
    }
    if(pct >= 100){
      clearInterval(interval);
      if(pctEl) pctEl.textContent = '100%';
      if(barEl) barEl.style.width = '100%';
      if(txtEl) txtEl.textContent = 'LAUNCH READY.';
      setTimeout(()=>{
        gsap.to('#loader',{opacity:0, scale:1.04, duration:0.7, ease:'power2.in',
          onComplete:()=>{
            const l = document.getElementById('loader');
            if(l) l.style.display='none';
            onDone();
          }
        });
      }, 500);
    }
  }, 350);
}
